version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX=100
      - SESSION_SECRET=${SESSION_SECRET:-default-session-secret}
      - CSRF_SECRET=${CSRF_SECRET:-default-csrf-secret}
      - API_KEY=${API_KEY:-default-api-key}
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
    depends_on:
      - redis
    networks:
      - api-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - api-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - api-network

volumes:
  redis-data:
    driver: local

networks:
  api-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16